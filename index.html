<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" sizes="57x57" href="images/icon2.jpg">

<link rel="apple-touch-icon" sizes="120x120" href="images/icon2.jpg">

<link rel="apple-touch-icon" sizes="152x152" href="images/icon2.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="images/icon2.jpg">

<meta name="apple-mobile-web-app-title" content="Nasta佐野">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background-color: #fff; color: #333; line-height: 1.5; }
    .container { max-width: 1000px; margin: 0 auto; background-color: #fff; }
    a.img-placeholder { display: block; border: none; text-decoration: none; overflow: hidden; background-color: #fff; }
    a.img-placeholder img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s ease; }
    a.img-placeholder:hover img { opacity: 0.7; }

    /* ナビゲーション */
    .top-nav { background-color: #dcdcdc; padding: 8px 15px; display: flex; flex-wrap: wrap; gap: 6px; }
    .top-nav button { background-color: #fff; border: 1px solid #333; padding: 4px 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

    /* ヒーロー */
    .hero { display: flex; flex-wrap: wrap; }
    .hero-left { flex: 1; min-width: 280px; background-color: #2b2b2b; color: #fff; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; }
    .hero-left-info { display: flex; flex-direction: column; gap: 10px; }
    .catch-copy { font-size: 10px; color: #ddd; line-height: 1.4; text-align: center; }
    .brand-logo { text-align: center; }
    .brand-logo .logo-main { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
    .brand-logo .logo-sub { font-size: 16px; font-weight: bold; }
    .hero-left-buttons { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hero-btn { background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 10px; font-size: 11px; cursor: pointer; }
    .hero-left .img-placeholder { width: 110px; height: 150px; margin-left: 15px; flex-shrink: 0; }
    .hero-right { flex: 1; min-width: 280px; background-color: #b8b8b8; padding: 15px 20px; position: relative; display: flex; flex-direction: column; }
    .right-logo-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 10px; }
    .hero-right-content { display: flex; justify-content: space-between; align-items: stretch; gap: 15px; flex: 1; }
    .hero-right .img-placeholder { flex: 1; min-height: 120px; }
    .hero-right-buttons { display: flex; flex-direction: column; justify-content: center; gap: 8px; flex-shrink: 0; }
    .bubble { position: absolute; top: 8px; right: 15px; border: 3px solid #e60012; border-radius: 40px; padding: 5px 10px; background-color: #fff; color: #e60012; font-weight: bold; font-size: 12px; z-index: 10; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
    .bubble::before { content: ""; position: absolute; bottom: -15px; left: 30px; border-width: 15px 10px 0 10px; border-style: solid; border-color: #e60012 transparent transparent transparent; transform: rotate(-15deg); }
    .bubble::after { content: ""; position: absolute; bottom: -10px; left: 31px; border-width: 12px 8px 0 8px; border-style: solid; border-color: #fff transparent transparent transparent; transform: rotate(-15deg); }

    /* 依頼ボタン */
    .request-section { background-color: #111; padding: 15px; }
    .request-title-wrapper { margin-bottom: 12px; }
    .request-title { display: inline-block; background-color: #555; color: #fff; padding: 5px 25px; border-radius: 20px; border: 2px solid #999; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    .request-buttons { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; }
    .request-buttons button { flex: 1; min-width: 100px; color: #fff; border: 2px solid #fff; border-radius: 8px; padding: 14px 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-color-1 { background-color: #3b4b66; } .btn-color-2 { background-color: #446e53; } .btn-color-3 { background-color: #3b4b66; } .btn-color-4 { background-color: #c4693a; } .btn-color-5 { background-color: #2b7d3b; }

    /* 担当者情報 */
    .contact-section { background-color: #eee; padding: 15px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 15px; }
    .contact-info { font-size: 15px; line-height: 1.8; }
    .contact-info-name { font-size: 17px; margin-bottom: 5px; }
    .contact-info .icon-mail { font-size: 16px; vertical-align: middle; margin-right: 5px; }
    .contact-section .img-placeholder { width: 130px; height: 170px; flex-shrink: 0; border: 2px solid #000; }
    .catalog-text-box { background-color: #fff; border: 1px solid #aaa; padding: 15px; font-size: 12px; min-width: 200px; flex: 1; }
    .catalog-text-box p { margin-bottom: 8px; }
    .catalog-text-box p.note { font-size: 10px; margin-top: 15px; margin-bottom: 0; }

    /* カタログ */
    .catalog-section { padding: 20px 0 40px 0; }
    .catalog-header { background-color: #000; color: #fff; display: inline-block; padding: 8px 40px; font-size: 16px; font-weight: bold; margin-bottom: 20px; }
    .catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 30px; padding: 0 30px; }
    .catalog-grid .img-placeholder { aspect-ratio: 1 / 1.4; }

    /* フッター画像 */
    .footer-images-section { background-color: #000; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .footer-row { display: flex; justify-content: center; width: 100%; }
    .footer-row .img-placeholder { height: 90px; }
    .footer-row-top { width: 60%; }
    .footer-row-top .img-placeholder { flex: 1; }
    .footer-row-bottom { width: 100%; }
    .footer-row-bottom .img-placeholder { flex: 1; }
    .footer-row .img-placeholder img { object-fit: contain; object-position: center; }

    /* スマホ対応 */
    @media (max-width: 600px) {
        /* ヒーローをコンパクトに */
        .hero { flex-direction: column; }
        .hero-left { min-width: unset; width: 100%; padding: 12px 15px; }
        .hero-right { min-width: unset; width: 100%; padding: 12px 15px; }
        .hero-left .img-placeholder { width: 75px; height: 100px; }
        .hero-left-info { gap: 8px; }
        .brand-logo .logo-main { font-size: 18px; }
        .brand-logo .logo-sub { font-size: 14px; }
        .catch-copy { font-size: 9px; }
        .right-logo-title { font-size: 15px; margin-bottom: 8px; }
        .hero-right .img-placeholder { min-height: 90px; }
        .bubble { font-size: 10px; padding: 4px 8px; top: 5px; right: 8px; }

        /* 依頼ボタンを大きく */
        .request-section { padding: 12px; }
        .request-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .request-buttons button { min-width: unset; width: 100%; font-size: 18px; padding: 18px 5px; border-radius: 10px; }
        .request-buttons button:last-child { grid-column: 1 / -1; }
        .request-title { font-size: 14px; padding: 4px 15px; }

        /* その他 */
        .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .contact-section { flex-direction: column; align-items: flex-start; }
        .footer-row-top { width: 100%; }
        .footer-row .img-placeholder { height: 65px; }
        .top-nav { padding: 6px 10px; gap: 5px; }
        .top-nav button { font-size: 10px; padding: 4px 8px; }
    }
</style>
</head>
